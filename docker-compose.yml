services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER:-atlasnote}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atlasnote}
      POSTGRES_DB: ${DB_NAME:-atlasnote}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-atlasnote}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-atlasnote}:${DB_PASSWORD:-atlasnote}@postgres:5432/${DB_NAME:-atlasnote}
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: >
      sh -c "cd /app && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-atlasnote}:${DB_PASSWORD:-atlasnote}@postgres:5432/${DB_NAME:-atlasnote}
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mcp-server:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.mcp
    ports:
      - "9000:9000"
    environment:
      API_BASE_URL: http://api:8000
      MCP_TRANSPORT: sse
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
